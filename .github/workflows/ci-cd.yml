name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Chạy khi bạn push code lên branch main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Dùng máy ảo Linux của GitHub để chạy

    steps:
      # 1. Lấy code từ GitHub về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài đặt môi trường Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Giúp build nhanh hơn ở các lần sau

      # 3. Build file JAR (giống lệnh .\mvnw clean package bạn làm ở local)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Đăng nhập vào Docker Hub dùng Secrets đã cài
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build Docker Image và Push lên Docker Hub
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest